# Params for Nav2 nodes

bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: "map"
    robot_base_frame: "base_link"
    # Used by BT client node (and OrcaGeomIsPathValid) for map<->base_link TF lookup
    transform_tolerance: 1.0
    odom_topic: "/odom"
    bt_loop_duration: 10
    default_server_timeout: 20
    default_nav_to_pose_bt_xml: "bringup.py should replace me"

    # Nav2 gets mad if we don't load most (all?) of these plugins, even though they are not used
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - orca_nav2_bt_plugins

bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: True

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["LongStraightLine"]

    # Progress checker parameters
    progress_checker:
      plugin: "orca_nav2/ProgressChecker3D"
      radius: 0.5
      time_allowance: 10.0

    # Goal checker parameters
    goal_checker:
      plugin: "orca_nav2/GoalChecker3D"
      xy_goal_tolerance: 0.8
      z_goal_tolerance: 0.5

    # Controller parameters
    LongStraightLine:
      plugin: "orca_nav2/PurePursuitController3D"
      lookahead_dist: 1.0
      transform_tolerance: 1.0
      goal_tolerance: 0.2
      tick_rate: 20.0  # Loop rate, must match controller_frequency

      # Desired velocities and accelerations
      x_vel: 0.4
      x_accel: 0.4
      z_vel: 0.3
      z_accel: 0.3
      yaw_vel: 0.25
      yaw_accel: 0.5

      # The motion model may be bogus, so actual velocity may be lower or higher than desired
      # velocity. Specify a range using the error terms, e.g.,
      # [(1 - yaw_error_) * yaw_vel_, (1 + yaw_error_) * yaw_vel_]
      x_error: 0.5
      yaw_error: 0.6
      # Tracking topics: 3x Float64 + PointStamped + PoseStamped + TwistStamped (see README)
      publish_tracking_error: true

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True


# The local costmap is always empty
# This configuration can probably be simplified, e.g., there's no laser scanner
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: true
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: ""
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: True
        inflation_radius: 0.5

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: true
      rolling_window: true
      track_unknown_space: true
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: ""
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: True
        inflation_radius: 0.5


planner_server:
  ros__parameters:
    use_sim_time: True
    planner_plugins: ["StraightLine"]

    # OrcaPlanner parameters
    StraightLine:
      plugin: "orca_nav2/StraightLinePlanner3D"
      planning_dist: 0.1  # Plan a pose every planning_dist meters

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True

# Nav2 Humble: use behavior_plugins + nav2_behaviors/* (not recovery_plugins / nav2_recoveries).
# Wrong names/types leave behavior_server configure failing → unconfigured forever.
behavior_server:
  ros__parameters:
    costmap_topic: "local_costmap/costmap_raw"
    footprint_topic: "local_costmap/published_footprint"
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: "odom"
    robot_base_frame: "base_link"
    transform_timeout: 2.0
    use_sim_time: True
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: True

waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: False
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 2000   # Sleep for 2000ms